<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sudoku Game</title>
  <style>body {
  font-family: 'Segoe UI', sans-serif;
  text-align: center;
  background: #f9f9f9;
  padding: 20px;
}

#sudoku-board {
  display: grid;
  grid-template-columns: repeat(9, 40px);
  grid-template-rows: repeat(9, 40px);
  gap: 2px;
  justify-content: center;
  margin: 20px auto;
}

input {
  width: 38px;
  height: 38px;
  text-align: center;
  font-size: 18px;
  border: 1px solid #ccc;
}

input[readonly] {
  background-color: #e0e0e0;
  font-weight: bold;
}

button {
  margin-top: 10px;
  padding: 8px 16px;
  font-size: 16px;
}

#result {
  margin-top: 10px;
  font-weight: bold;
}
    </style>
</head>
<body>
  <h1>🧩 Sudoku Game</h1>
  <div id="sudoku-board"></div>
  <button onclick="checkSudoku()">Check</button>
  <p id="result"></p>
  <script>const board = document.getElementById('sudoku-board');

// Sample puzzle (0 = empty)
const puzzle = [
  [5, 3, 0, 0, 7, 0, 0, 0, 0],
  [6, 0, 0, 1, 9, 5, 0, 0, 0],
  [0, 9, 8, 0, 0, 0, 0, 6, 0],
  [8, 0, 0, 0, 6, 0, 0, 0, 3],
  [4, 0, 0, 8, 0, 3, 0, 0, 1],
  [7, 0, 0, 0, 2, 0, 0, 0, 6],
  [0, 6, 0, 0, 0, 0, 2, 8, 0],
  [0, 0, 0, 4, 1, 9, 0, 0, 5],
  [0, 0, 0, 0, 8, 0, 0, 7, 9]
];

function createBoard() {
  for (let row = 0; row < 9; row++) {
    for (let col = 0; col < 9; col++) {
      const input = document.createElement('input');
      input.maxLength = 1;
      input.dataset.row = row;
      input.dataset.col = col;
      if (puzzle[row][col] !== 0) {
        input.value = puzzle[row][col];
        input.readOnly = true;
      }
      board.appendChild(input);
    }
  }
}

function checkSudoku() {
  const inputs = board.querySelectorAll('input');
  const grid = Array.from({ length: 9 }, () => Array(9).fill(0));

  inputs.forEach(input => {
    const row = input.dataset.row;
    const col = input.dataset.col;
    const val = parseInt(input.value);
    grid[row][col] = isNaN(val) ? 0 : val;
  });

  const valid = isValidSudoku(grid);
  document.getElementById('result').textContent = valid ? '✅ Sudoku is valid!' : '❌ Invalid Sudoku!';
}

function isValidSudoku(grid) {
  const check = arr => {
    const nums = arr.filter(n => n !== 0);
    return new Set(nums).size === nums.length;
  };

  for (let i = 0; i < 9; i++) {
    if (!check(grid[i])) return false;
    if (!check(grid.map(row => row[i]))) return false;
  }

  for (let r = 0; r < 9; r += 3) {
    for (let c = 0; c < 9; c += 3) {
      const box = [];
      for (let i = 0; i < 3; i++) {
        for (let j = 0; j < 3; j++) {
          box.push(grid[r + i][c + j]);
        }
      }
      if (!check(box)) return false;
    }
  }

  return true;
}

createBoard();</script>
</body>
</html>
