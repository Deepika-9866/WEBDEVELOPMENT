<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chatbot with Typing Animation</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 400px;
      height: 600px;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-box {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .message {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 80%;
      animation: fadeIn 0.5s ease;
    }

    .user {
      background: #667eea;
      color: #fff;
      align-self: flex-end;
    }

    .bot {
      background: #eee;
      color: #333;
      align-self: flex-start;
    }

    .typing {
      font-style: italic;
      color: #888;
      margin: 5px 0;
      animation: blink 1s infinite;
    }

    .input-box {
      display: flex;
      border-top: 1px solid #ccc;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      font-size: 1rem;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #764ba2;
      color: #fff;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #667eea;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0% { opacity: 0.2; }
      50% { opacity: 1; }
      100% { opacity: 0.2; }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-box" id="chatBox"></div>
    <div class="input-box">
      <input type="text" id="userInput" placeholder="Type a message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");

    function sendMessage() {
      const text = userInput.value.trim();
      if (text === "") return;

      addMessage(text, "user");
      userInput.value = "";

      showTyping();

      setTimeout(() => {
        removeTyping();
        const reply = getBotReply(text);
        addMessage(reply, "bot");
      }, 1500); // delay for typing effect
    }

    function addMessage(text, sender) {
      const msg = document.createElement("div");
      msg.classList.add("message", sender);
      msg.textContent = text;
      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
      const typing = document.createElement("div");
      typing.classList.add("typing");
      typing.id = "typing";
      typing.textContent = "Bot is typing...";
      chatBox.appendChild(typing);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById("typing");
      if (typing) typing.remove();
    }

    function getBotReply(input) {
      input = input.toLowerCase();

      const greetings = ["Hey there! 👋", "Hello, friend!", "Hi! How’s your day going?"];
      const mood = ["I’m doing great, thanks!", "Feeling awesome today!", "I’m just a bot, but I’m happy!"];
      const nameReplies = ["I’m your friendly chatbot 🤖", "Call me BotBuddy!", "I’m here to chat with you!"];
      const byeReplies = ["Goodbye! 🌸", "See you soon!", "Take care, friend!"];

      if (input.includes("hello") || input.includes("hi")) {
        return randomReply(greetings);
      } else if (input.includes("how are you")) {
        return randomReply(mood);
      } else if (input.includes("your name")) {
        return randomReply(nameReplies);
      } else if (input.includes("bye")) {
        return randomReply(byeReplies);
      } else {
        return "Hmm, I don’t understand that yet. Try asking something else!";
      }
    }

    function randomReply(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }
  </script>
</body>
</html>
